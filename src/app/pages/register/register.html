<section class="container auth-wrapper">
  <div class="auth-card glass">
    <span class="tag">Cadastro</span>
    <h2>Criar nova conta</h2>
    <p>Seus dados ficam salvos localmente no navegador para facilitar testes e demonstracoes.</p>

    <form class="auth-form" (ngSubmit)="register()">
      <div class="form-group">
        <label for="name">Nome</label>
        <input id="name" type="text" [(ngModel)]="name" name="name" placeholder="Digite seu nome" required />
      </div>

      <div class="form-group">
        <label for="register-email">E-mail</label>
        <input id="register-email" type="email" [(ngModel)]="email" name="email" placeholder="Digite seu e-mail" required />
      </div>

      <div class="form-group">
        <label for="register-password">Senha</label>
        <input id="register-password" type="password" [(ngModel)]="password" name="password" placeholder="Crie uma senha" required />
      </div>

      <p class="form-feedback error" *ngIf="errorMessage">{{ errorMessage }}</p>
      <p class="form-feedback success" *ngIf="successMessage">{{ successMessage }}</p>

      <button type="submit" class="auth-btn">Cadastrar</button>
    </form>

    <p class="auth-link-text">
      Ja possui conta?
      <a routerLink="/login">Fazer login</a>
    </p>
  </div>
</section>
