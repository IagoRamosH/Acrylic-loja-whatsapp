<section class="container">
  <div class="products-header glass">
    <span class="tag">Catalogo</span>
    <h2>Nossos produtos</h2>
    <p>Escolha o produto desejado e solicite atendimento direto pelo WhatsApp.</p>
  </div>

  <div class="products-grid">
    <app-product-card

      [product]="product">
    </app-product-card>
  </div>
</section>
