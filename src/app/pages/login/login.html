<section class="container auth-wrapper">
  <div class="auth-card glass">
    <span class="tag">Acesso</span>
    <h2>Entrar na sua conta</h2>
    <p>Use sua conta local para acessar o perfil e continuar os pedidos da loja.</p>

    <div class="hint-card">
      <strong>Conta demo</strong>
      <span>E-mail: usuario@email.com</span>
      <span>Senha: 123456</span>
    </div>

    <form class="auth-form" (ngSubmit)="login()">
      <div class="form-group">
        <label for="email">E-mail</label>
        <input id="email" type="email" [(ngModel)]="email" name="email" placeholder="Digite seu e-mail" required />
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input id="password" type="password" [(ngModel)]="password" name="password" placeholder="Digite sua senha" required />
      </div>

      <p class="form-feedback error" *ngIf="errorMessage">{{ errorMessage }}</p>

      <button type="submit" class="auth-btn">Entrar</button>
    </form>

    <p class="auth-link-text">
      Ainda nao tem conta?
      <a routerLink="/cadastro">Criar cadastro</a>
    </p>
  </div>
</section>
